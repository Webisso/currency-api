name: Daily Currency Fetch

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "data/**"
      - "public/**"
  schedule:
    # 17:30 TRT = 14:30 UTC
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and store source XML snapshot
        run: npm run fetch

      - name: Build JSON API artifacts
        run: npm run build:api

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add data public
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore(data): update currency snapshots"
          git push
